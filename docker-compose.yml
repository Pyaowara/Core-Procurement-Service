services:
  auth-db:
    image: postgres:latest
    container_name: auth-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: auth_db
    ports:
      - "5433:5432"
    volumes:
      - auth_pgdata:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  inventory-db:
    image: postgres:latest
    container_name: inventory-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: inventory_db
    ports:
      - "5434:5432"
    volumes:
      - inventory_pgdata:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  purchase-db:
    image: postgres:latest
    container_name: purchase-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: purchase_db
    ports:
      - "5435:5432"
    volumes:
      - purchase_pgdata:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  approval-db:
    image: postgres:latest
    container_name: approval-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: approval_db
    ports:
      - "5436:5432"
    volumes:
      - approval_pgdata:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      AUTH_SERVICE_URL: "http://auth-identity-service:6767"
      INVENTORY_SERVICE_URL: "http://inventory-service:6768"
      PURCHASE_SERVICE_URL: "http://purchase-service:6769"
      APPROVAL_SERVICE_URL: "http://approval-service:6770"
    depends_on:
      - auth-identity-service
      - inventory-service
      - purchase-service
      - approval-service
  auth-identity-service:
    build:
      context: ./services/auth-identity-service
      dockerfile: Dockerfile
    container_name: auth-identity-service
    restart: unless-stopped
    ports:
      - "6767:6767"
    environment:
      PORT: "6767"
      DB_DSN: "host=auth-db user=${POSTGRES_USER:-postgres} password=${POSTGRES_PASSWORD:-postgres} dbname=auth_db port=5432 sslmode=disable"
      JWT_SECRET: "${JWT_SECRET:-super-secret-jwt-key-change-me}"
    depends_on:
      auth-db:
        condition: service_healthy

  inventory-service:
    build:
      context: ./services/inventory-service
      dockerfile: Dockerfile
    container_name: inventory-service
    restart: unless-stopped
    ports:
      - "6768:6768"
    environment:
      PORT: "6768"
      DB_DSN: "host=inventory-db user=${POSTGRES_USER:-postgres} password=${POSTGRES_PASSWORD:-postgres} dbname=inventory_db port=5432 sslmode=disable"
      JWT_SECRET: "${JWT_SECRET:-super-secret-jwt-key-change-me}"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
    depends_on:
      inventory-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  purchase-service:
    build:
      context: ./services/purchase-service
      dockerfile: Dockerfile
    container_name: purchase-service
    restart: unless-stopped
    ports:
      - "6769:6769"
    environment:
      PORT: "6769"
      DB_DSN: "host=purchase-db user=${POSTGRES_USER:-postgres} password=${POSTGRES_PASSWORD:-postgres} dbname=purchase_db port=5432 sslmode=disable"
      JWT_SECRET: "${JWT_SECRET:-super-secret-jwt-key-change-me}"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      INVENTORY_SERVICE_URL: "http://inventory-service:6768"
    depends_on:
      purchase-db:
        condition: service_healthy

  approval-service:
    build:
      context: ./services/approval-service
      dockerfile: Dockerfile
    container_name: approval-service
    restart: unless-stopped
    ports:
      - "6770:6770"
    environment:
      PORT: "6770"
      DB_DSN: "host=approval-db user=${POSTGRES_USER:-postgres} password=${POSTGRES_PASSWORD:-postgres} dbname=approval_db port=5432 sslmode=disable"
      JWT_SECRET: "${JWT_SECRET:-super-secret-jwt-key-change-me}"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
    depends_on:
      approval-db:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  auth_pgdata:
  inventory_pgdata:
  purchase_pgdata:
  approval_pgdata:
  rabbitmq_data:


